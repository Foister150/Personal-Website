services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: landonfoister-web
    container_name: landonfoister-web
    ports:
      - "80:80"
    volumes:
      - ./index.html:/srv/static/index.html:ro
      - ./projects:/srv/static/projects:ro
      - ./certifications:/srv/static/certifications:ro
      - ./resume:/srv/static/resume:ro
      - ./visual-board:/srv/static/visual-board:ro
      - ./blog:/srv/static/blog:ro
      - ./assets:/srv/static/assets:ro
    depends_on:
      - bashupload
    restart: unless-stopped

  bashupload:
    image: ghcr.io/mainfrezzer/bashupload
    container_name: landonfoister-bashupload
    environment:
      # Max upload size. Note: Cloudflare's free plan caps request bodies at 100MB.
      - UPLOADSIZE=100M
    volumes:
      - bashupload-files:/app/files
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: landonfoister-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  bashupload-files:
